<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svatba H&A</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
     # background-color: #f9f7f2;
      color: #222;
    }

    .banner {
      position: relative;
      height: 300px;
      background-image: url('my-image.jpeg'); /* Replace with your photo */
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .banner h1 {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Playfair Display', serif;
      letter-spacing: 8px;
      font-size: 6rem;
      margin: 0;
      font-weight: 150;
    }

    .banner p {
      margin-top: 10px;
      border-radius: 6px;
      font-family: 'Playfair Display', serif;
      font-weight: 200;
      letter-spacing: 1px;
      font-size: 1.2rem;
      margin: 0;
    }

    nav {
      background-color: #4f6f8a;
      padding: 10px 0;
      border-bottom: 1px solid #c9a96e;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 1px;
    }

    nav ul li a:hover {
      color: #c9a96e;
    }

    section {
      padding: 40px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #c9a96e;
    }

    .bottom-banner {
      background: linear-gradient(to top, #4f6f8a, #6f8fa8);
      color: white;
      text-align: center;
      padding: 30px 20px;
      margin-top: 40px;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .bottom-banner p {
      margin: 0;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="banner">
    <h1>Huong & Andrej</h1>
    <p>12. září 2026</p>
  </div>

  <nav>
    <ul>
      <li><a href="#section1">Section 1</a></li>
      <li><a href="#section2">Section 2</a></li>
      <li><a href="#section3">Section 3</a></li>
    </ul>
  </nav>

  <section id="section1">
    <h2>Section 1</h2>
    <p>Content for section 1 goes here.</p>
  </section>

  <section id="section2">
    <h2>Section 2</h2>
    <p>Content for section 2 goes here.</p>
  </section>

  <section id="section3">
    <h2>Section 3</h2>
    <p>Content for section 3 goes here.</p>
  </section>

  <div class="bottom-banner">
    <p>© 2026 Your Brand — All rights reserved</p>
  </div>

</body>
</html>
